<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EUA - Bandeira em Chamas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="cenario">
        <div class="mastro"></div>
        
        <div id="flag-container" class="flag-container" onclick="iniciarQueima()">
            <div class="flag">
                <div class="blue-square"></div>
                <div class="stripes">
                    <div class="red"></div><div class="white"></div>
                    <div class="red"></div><div class="white"></div>
                    <div class="red"></div><div class="white"></div>
                    <div class="red"></div>
                </div>
            </div>

            <div class="fire-wrapper">
                <div class="flame"></div>
                <div class="flame" style="animation-delay: 0.1s"></div>
                <div class="flame" style="animation-delay: 0.2s"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
